                    const now = new Date();
                    
                    // Target: Every Friday at 11:30 AM IST (Indian Standard Time).
                    // 11:30 AM IST is 6:00 AM UTC.
                    const target = new Date(Date.UTC(
                        now.getUTCFullYear(),
                        now.getUTCMonth(),
                        now.getUTCDate(),
                        6, 0, 0, 0 // 6:00 AM UTC
                    ));

                    const currentDay = now.getUTCDay(); // 0 = Sunday, 5 = Friday, 6 = Saturday
                    let daysUntilFriday = (5 - currentDay + 7) % 7;

                    // If it is Friday, check if we've already passed 11:30 AM IST (6:00 UTC) today
                    if (daysUntilFriday === 0 && now.getTime() >= target.getTime()) {
                        daysUntilFriday = 7; // Target next week's Friday
                    }

                    target.setUTCDate(target.getUTCDate() + daysUntilFriday);
                    
                    const difference = target.getTime() - now.getTime();

                    if (difference <= 0) {
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                    } else {
                        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((difference % (1000 * 60)) / 1000);
                        setTimeLeft({ days, hours, minutes, seconds });
